schema_version: 1

context:
  name: xcube-cci
  python_min: "3.10"
  version: "0.13"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/xcube_cci-${{ version }}.tar.gz
  sha256: cc7720135bac0bf582371576a702e585dcecfd7cd23b38f4f609f63d0bde038c
  patches:
    - rename_xcube.patch

build:
  number: 1
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools
    - setuptools-scm
    - pip
  run:
    - python >=${{ python_min }}
    - aiohttp >=3.6
    - lxml >=4.5
    - nest-asyncio >=1.3
    - numpy >=2
    - pydap >=3.4,<=3.5.3
    # beautifulsoup4 is required by pydap 3.5.3, but not listed in the recipe
    # for the 3.5.3 build. TODO: remove the beautifulsoup4 dependency once a
    # newer version of pydap is supported.
    - beautifulsoup4
    - rioxarray
    - xcube >=1.8.0
    - xvec
    - zarr <3

tests:
  - python:
      imports:
        - xcube_cci
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: An xcube plugin that allows generating data cubes from the ESA CCI Open Data Portal.
  description: xcube-cci is an xcube plugin that allows generating data cubes from the ESA CCI Open Data Portal.
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/esa-cci/xcube-cci
  documentation: https://github.com/esa-cci/xcube-cci/blob/master/README.md

extra:
  recipe-maintainers:
    - pont-us
    - TejasMorbagal
    - TonioF
    - forman
    - AliceBalfanz
    - thomasstorm
    - konstntokas
    - b-yogesh
    - clarasb
